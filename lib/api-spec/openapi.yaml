openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Smart Cafeteria Management System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: categories
    description: Menu categories
  - name: products
    description: Menu products
  - name: cart
    description: Shopping cart
  - name: orders
    description: Order management
  - name: payments
    description: Payment processing
  - name: admin
    description: Admin operations
  - name: reports
    description: Reports and analytics
  - name: recommendations
    description: AI food recommendations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # AUTH
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # CATEGORIES
  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create category (admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    patch:
      operationId: updateCategory
      tags: [categories]
      summary: Update category (admin)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete category (admin)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # PRODUCTS
  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List products with optional filters
      parameters:
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
        - name: available
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create product (admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get single product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update product (admin)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete product (admin)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /products/{id}/stock:
    patch:
      operationId: updateStock
      tags: [products]
      summary: Update product stock (admin)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StockUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  # CART
  /cart:
    get:
      operationId: getCart
      tags: [cart]
      summary: Get current user cart
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"

  /cart/items:
    post:
      operationId: addCartItem
      tags: [cart]
      summary: Add item to cart
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CartItemInput"
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"

  /cart/items/{productId}:
    patch:
      operationId: updateCartItem
      tags: [cart]
      summary: Update cart item quantity
      security:
        - bearerAuth: []
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CartItemUpdate"
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
    delete:
      operationId: removeCartItem
      tags: [cart]
      summary: Remove item from cart
      security:
        - bearerAuth: []
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"

  /cart/clear:
    delete:
      operationId: clearCart
      tags: [cart]
      summary: Clear cart
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Empty cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"

  # ORDERS
  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders (own orders for users, all for admin)
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, confirmed, preparing, ready, completed, cancelled]
        - name: tableNumber
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Place an order from cart
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get order details
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}/status:
    patch:
      operationId: updateOrderStatus
      tags: [orders]
      summary: Update order status (admin)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderStatusUpdate"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}/cancel:
    post:
      operationId: cancelOrder
      tags: [orders]
      summary: Cancel an order
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Cancelled order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  # PAYMENTS
  /payments/initiate:
    post:
      operationId: initiatePayment
      tags: [payments]
      summary: Initiate payment for an order
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentInput"
      responses:
        "200":
          description: Payment initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /payments/{id}/confirm:
    post:
      operationId: confirmPayment
      tags: [payments]
      summary: Confirm payment
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentConfirm"
      responses:
        "200":
          description: Payment confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /payments/order/{orderId}:
    get:
      operationId: getPaymentByOrder
      tags: [payments]
      summary: Get payment for an order
      security:
        - bearerAuth: []
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  # ADMIN DASHBOARD
  /admin/dashboard:
    get:
      operationId: getAdminDashboard
      tags: [admin]
      summary: Admin dashboard stats
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /admin/low-stock:
    get:
      operationId: getLowStockProducts
      tags: [admin]
      summary: Products with low stock
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Low stock products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /admin/recent-orders:
    get:
      operationId: getRecentOrders
      tags: [admin]
      summary: Recent orders for admin
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Recent orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  # REPORTS
  /reports/sales:
    get:
      operationId: getSalesReport
      tags: [reports]
      summary: Sales report
      security:
        - bearerAuth: []
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Sales report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesReport"

  /reports/top-products:
    get:
      operationId: getTopProducts
      tags: [reports]
      summary: Top selling products
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Top products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopProduct"

  /reports/category-breakdown:
    get:
      operationId: getCategoryBreakdown
      tags: [reports]
      summary: Revenue by category
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Category breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryRevenue"

  # AI RECOMMENDATIONS
  /recommendations:
    get:
      operationId: getRecommendations
      tags: [recommendations]
      summary: AI food recommendations for current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Recommendations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  # QR TABLE
  /qr/table/{tableNumber}:
    get:
      operationId: getTableMenu
      tags: [products]
      summary: Get menu for a table via QR code (no auth needed)
      parameters:
        - name: tableNumber
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Table menu info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TableMenu"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    # AUTH
    RegisterInput:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        role:
          type: string
          enum: [customer, admin]

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      required: [id, name, email, role, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [customer, admin]
        createdAt:
          type: string
          format: date-time

    # CATEGORIES
    CategoryInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]

    CategoryUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]

    Category:
      type: object
      required: [id, name, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        productCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    # PRODUCTS
    ProductInput:
      type: object
      required: [name, price, categoryId]
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: number
          format: float
        imageUrl:
          type: ["string", "null"]
        categoryId:
          type: integer
        stock:
          type: integer
        isAvailable:
          type: boolean
        preparationTime:
          type: ["integer", "null"]
        calories:
          type: ["integer", "null"]
        isVegetarian:
          type: boolean
        isSpicy:
          type: boolean
        tags:
          type: array
          items:
            type: string

    ProductUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: number
          format: float
        imageUrl:
          type: ["string", "null"]
        categoryId:
          type: integer
        stock:
          type: integer
        isAvailable:
          type: boolean
        preparationTime:
          type: ["integer", "null"]
        calories:
          type: ["integer", "null"]
        isVegetarian:
          type: boolean
        isSpicy:
          type: boolean
        tags:
          type: array
          items:
            type: string

    StockUpdate:
      type: object
      required: [stock]
      properties:
        stock:
          type: integer

    Product:
      type: object
      required: [id, name, price, categoryId, stock, isAvailable, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: number
        imageUrl:
          type: ["string", "null"]
        categoryId:
          type: integer
        categoryName:
          type: ["string", "null"]
        stock:
          type: integer
        isAvailable:
          type: boolean
        preparationTime:
          type: ["integer", "null"]
        calories:
          type: ["integer", "null"]
        isVegetarian:
          type: boolean
        isSpicy:
          type: boolean
        tags:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time

    # CART
    CartItemInput:
      type: object
      required: [productId, quantity]
      properties:
        productId:
          type: integer
        quantity:
          type: integer
          minimum: 1

    CartItemUpdate:
      type: object
      required: [quantity]
      properties:
        quantity:
          type: integer
          minimum: 0

    CartItem:
      type: object
      required: [id, productId, productName, price, quantity, subtotal]
      properties:
        id:
          type: integer
        productId:
          type: integer
        productName:
          type: string
        productImageUrl:
          type: ["string", "null"]
        price:
          type: number
        quantity:
          type: integer
        subtotal:
          type: number

    Cart:
      type: object
      required: [items, total, itemCount]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CartItem"
        total:
          type: number
        itemCount:
          type: integer

    # ORDERS
    OrderInput:
      type: object
      required: [paymentMethod]
      properties:
        tableNumber:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        paymentMethod:
          type: string
          enum: [cash, card, upi]

    OrderStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending, confirmed, preparing, ready, completed, cancelled]

    OrderItem:
      type: object
      required: [id, productId, productName, price, quantity, subtotal]
      properties:
        id:
          type: integer
        productId:
          type: integer
        productName:
          type: string
        productImageUrl:
          type: ["string", "null"]
        price:
          type: number
        quantity:
          type: integer
        subtotal:
          type: number

    Order:
      type: object
      required: [id, userId, status, total, items, paymentMethod, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        userName:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, confirmed, preparing, ready, completed, cancelled]
        total:
          type: number
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        tableNumber:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        paymentMethod:
          type: string
          enum: [cash, card, upi]
        paymentStatus:
          type: string
          enum: [pending, paid, failed, refunded]
        estimatedReadyTime:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # PAYMENTS
    PaymentInput:
      type: object
      required: [orderId, method]
      properties:
        orderId:
          type: integer
        method:
          type: string
          enum: [cash, card, upi]
        upiId:
          type: ["string", "null"]

    PaymentConfirm:
      type: object
      required: [transactionId]
      properties:
        transactionId:
          type: string

    Payment:
      type: object
      required: [id, orderId, method, status, amount, createdAt]
      properties:
        id:
          type: integer
        orderId:
          type: integer
        method:
          type: string
          enum: [cash, card, upi]
        status:
          type: string
          enum: [pending, paid, failed, refunded]
        amount:
          type: number
        transactionId:
          type: ["string", "null"]
        upiId:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    # ADMIN DASHBOARD
    DashboardStats:
      type: object
      required: [totalRevenue, totalOrders, activeOrders, totalProducts, totalUsers, revenueToday, ordersToday, ordersByStatus]
      properties:
        totalRevenue:
          type: number
        totalOrders:
          type: integer
        activeOrders:
          type: integer
        totalProducts:
          type: integer
        totalUsers:
          type: integer
        revenueToday:
          type: number
        ordersToday:
          type: integer
        ordersByStatus:
          type: array
          items:
            $ref: "#/components/schemas/StatusCount"
        revenueByDay:
          type: array
          items:
            $ref: "#/components/schemas/DailyRevenue"

    StatusCount:
      type: object
      required: [status, count]
      properties:
        status:
          type: string
        count:
          type: integer

    DailyRevenue:
      type: object
      required: [date, revenue, orders]
      properties:
        date:
          type: string
        revenue:
          type: number
        orders:
          type: integer

    # REPORTS
    SalesReport:
      type: object
      required: [totalRevenue, totalOrders, averageOrderValue, dailyData]
      properties:
        totalRevenue:
          type: number
        totalOrders:
          type: integer
        averageOrderValue:
          type: number
        dailyData:
          type: array
          items:
            $ref: "#/components/schemas/DailyRevenue"

    TopProduct:
      type: object
      required: [productId, productName, totalQuantity, totalRevenue]
      properties:
        productId:
          type: integer
        productName:
          type: string
        productImageUrl:
          type: ["string", "null"]
        totalQuantity:
          type: integer
        totalRevenue:
          type: number
        categoryName:
          type: ["string", "null"]

    CategoryRevenue:
      type: object
      required: [categoryId, categoryName, revenue, orderCount]
      properties:
        categoryId:
          type: integer
        categoryName:
          type: string
        revenue:
          type: number
        orderCount:
          type: integer
        percentage:
          type: number

    TableMenu:
      type: object
      required: [tableNumber, categories, products]
